name: Orchestration Contracts Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/agent-adapters/src/orchestration/**'
      - 'packages/agent-adapters/src/registry/**'
      - 'packages/agent-adapters/src/facade/**'
      - 'packages/agent-adapters/src/__tests__/parallel-executor.contract.test.ts'
      - 'packages/agent-adapters/src/__tests__/parallel-executor-unhandled-rejection.test.ts'
      - 'packages/agent-adapters/src/__tests__/adapter-registry.test.ts'
      - 'packages/agent-adapters/src/__tests__/event-bus-bridge.test.ts'
      - 'packages/agent-adapters/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/orchestration-contracts.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/agent-adapters/src/orchestration/**'
      - 'packages/agent-adapters/src/registry/**'
      - 'packages/agent-adapters/src/facade/**'
      - 'packages/agent-adapters/src/__tests__/parallel-executor.contract.test.ts'
      - 'packages/agent-adapters/src/__tests__/parallel-executor-unhandled-rejection.test.ts'
      - 'packages/agent-adapters/src/__tests__/adapter-registry.test.ts'
      - 'packages/agent-adapters/src/__tests__/event-bus-bridge.test.ts'
      - 'packages/agent-adapters/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/orchestration-contracts.yml'

jobs:
  orchestration-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run orchestration contracts tests
        run: yarn test:orchestration:contracts
