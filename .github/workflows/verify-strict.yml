name: Verify Strict

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'typedoc.json'
      - 'tsconfig.docs.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/verify-strict.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'typedoc.json'
      - 'tsconfig.docs.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/verify-strict.yml'

permissions:
  contents: read

concurrency:
  group: verify-strict-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check domain boundary contracts
        run: yarn -s check:domain-boundaries

      - name: Check terminal tool-event guards
        run: yarn -s check:terminal-tool-event-guards

      - name: Run strict verification
        run: yarn -s verify:strict
