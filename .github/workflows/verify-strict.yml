name: Verify Strict

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'typedoc.json'
      - 'tsconfig.docs.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/verify-strict.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'typedoc.json'
      - 'tsconfig.docs.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/verify-strict.yml'

permissions:
  contents: read

concurrency:
  group: verify-strict-${{ github.ref }}
  cancel-in-progress: true

jobs:
  circular-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard-index: [0, 1, 2, 3]
        shard-count: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check circular imports shard
        run: node scripts/check-circular-deps.mjs --shard-index ${{ matrix.shard-index }} --shard-count ${{ matrix.shard-count }} --concurrency 2

  verify-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run strict verification without circular imports
        run: yarn -s verify:strict:no-circular
