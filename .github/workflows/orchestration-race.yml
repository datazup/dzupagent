name: Orchestration Race Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/agent-adapters/src/orchestration/**'
      - 'packages/agent-adapters/src/facade/**'
      - 'packages/agent-adapters/src/__tests__/parallel-executor*.test.ts'
      - 'packages/agent-adapters/src/__tests__/orchestrator-facade.test.ts'
      - 'packages/agent-adapters/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/orchestration-race.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/agent-adapters/src/orchestration/**'
      - 'packages/agent-adapters/src/facade/**'
      - 'packages/agent-adapters/src/__tests__/parallel-executor*.test.ts'
      - 'packages/agent-adapters/src/__tests__/orchestrator-facade.test.ts'
      - 'packages/agent-adapters/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/orchestration-race.yml'

jobs:
  orchestration-race:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run orchestration race tests
        run: yarn test:orchestration:race
