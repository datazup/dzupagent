name: Connectors Verified Build

on:
  pull_request:
    paths:
      - 'packages/connectors/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/connectors-verified.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/connectors/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/connectors-verified.yml'

jobs:
  connectors-verified:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run connectors verified build
        run: yarn build:connectors:verified
