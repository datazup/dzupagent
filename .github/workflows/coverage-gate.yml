name: Coverage Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/check-workspace-coverage.mjs'
      - 'coverage-thresholds.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/coverage-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/check-workspace-coverage.mjs'
      - 'coverage-thresholds.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/coverage-gate.yml'

permissions:
  contents: read

concurrency:
  group: coverage-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate coverage matrix
        id: generate
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const repoRoot = process.cwd()
          const packagesDir = path.join(repoRoot, 'packages')
          const entries = fs.readdirSync(packagesDir, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => entry.name)
            .filter((folder) => {
              const packageJsonPath = path.join(packagesDir, folder, 'package.json')
              if (!fs.existsSync(packageJsonPath)) {
                return false
              }
              const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
              return Boolean(pkg?.scripts?.['test:coverage'])
            })
            .map((folder) => {
              const pkg = JSON.parse(fs.readFileSync(path.join(packagesDir, folder, 'package.json'), 'utf8'))
              return {
                folder,
                workspace: pkg.name,
              }
            })
            .sort((left, right) => left.workspace.localeCompare(right.workspace))

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include: entries })}\n`)
          NODE

  package-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: discover-packages
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-packages.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run package coverage
        run: yarn workspace "${{ matrix.workspace }}" test:coverage

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.folder }}
          path: packages/${{ matrix.folder }}/coverage/
          if-no-files-found: error
          retention-days: 7

  workspace-coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: package-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Enforce workspace coverage gate
        run: yarn test:coverage:workspace
