name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    name: Version or Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build scraper package
        run: yarn build --filter=@dzupagent/scraper... --concurrency=4 --output-logs=full

      - name: Build all packages
        run: yarn build --concurrency=4 --output-logs=full

      - name: Check publish metadata
        run: yarn check:publish-metadata

      - name: Configure GitHub Packages publish auth
        run: |
          cat >> "$NPM_CONFIG_USERCONFIG" <<'NPMRC'
          @dzupagent:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          NPMRC

      - name: Report package publish auth mode
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "Package publish token is configured for GitHub Packages."
          else
            echo "No package publish token is configured."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: yarn release:publish
          version: yarn release:version
          title: 'chore: release @dzupagent packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
